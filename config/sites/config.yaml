base: 'https://eduardofrank.co'
errorHandling:
  -
    errorCode: 404
    errorHandler: Page
    errorContentSource: 't3://page?uid=12'
languages:
  -
    title: Español
    enabled: true
    languageId: 0
    base: /
    typo3Language: es
    locale: es_ES.UTF-8
    iso-639-1: es
    navigationTitle: Español
    hreflang: es_ES
    direction: ltr
    flag: es
  -
    title: English
    enabled: true
    base: /en/
    typo3Language: default
    locale: en_US
    iso-639-1: en
    navigationTitle: English
    hreflang: en-US
    direction: ltr
    fallbackType: strict
    fallbacks: ''
    flag: us
    languageId: 2
    websiteTitle: ''
  -
    title: Deutsch
    enabled: true
    languageId: 1
    base: /de/
    typo3Language: de
    locale: de_DE
    iso-639-1: de
    navigationTitle: Deutsch
    hreflang: de_DE
    direction: ltr
    fallbackType: strict
    fallbacks: ''
    flag: de
    websiteTitle: ''
rootPageId: 1
routes:
  -
    route: sitemap.xml
    type: uri
    source: 'https://eduardofrank.co/?type=1533906435'
  -
    route: en/sitemap.xml
    type: uri
    source: 'https://eduardofrank.co/en/?type=1533906435'
  -
    route: de/sitemap.xml
    type: uri
    source: 'http://eduardofrank.co/de/?type=1533906435'
websiteTitle: 'Eduardo Frank - TYPO3 Blog'
imports:
   - { resource: "EXT:blog/Configuration/Routes/Default.yaml" }
